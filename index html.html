<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetable Growth Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f0fdf4;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="sprout"></i> 野菜の生育管理
            </h1>
            <button onclick="toggleModal('add-modal', true)" class="bg-white text-green-600 p-2 rounded-full hover:bg-green-50 transition-colors">
                <i data-lucide="plus"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-4 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-xs text-gray-500">栽培中</p>
                <p id="stat-growing" class="text-2xl font-bold text-green-700">0</p>
            </div>
            <div class="glass-card p-4 rounded-2xl shadow-sm border-l-4 border-orange-400">
                <p class="text-xs text-gray-500">収穫間近</p>
                <p id="stat-harvest" class="text-2xl font-bold text-orange-700">0</p>
            </div>
        </div>

        <!-- Vegetable List -->
        <div id="vegetable-list" class="space-y-4">
            <!-- Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20 text-gray-400">
            <i data-lucide="shrub" class="mx-auto mb-2 opacity-20" size="48"></i>
            <p>育てている野菜がありません。<br>右上の＋ボタンから追加しましょう！</p>
        </div>
    </main>

    <!-- Add Modal -->
    <div id="add-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">新しい野菜を登録</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">野菜の名前</label>
                    <input type="text" id="input-name" placeholder="例: ミニトマト" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">種まき/植え付け日</label>
                    <input type="date" id="input-date" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">収穫予定（日数後）</label>
                    <input type="number" id="input-harvest-days" placeholder="例: 60" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="toggleModal('add-modal', false)" class="flex-1 py-3 bg-gray-100 rounded-xl font-medium">キャンセル</button>
                    <button onclick="addVegetable()" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-medium">登録する</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="log-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4" id="log-title">成長記録</h2>
            <div class="space-y-4">
                <textarea id="log-content" placeholder="今日の様子は？（例：芽が出た！、水をあげた）" class="w-full p-3 border rounded-xl h-32 focus:ring-2 focus:ring-green-500 outline-none"></textarea>
                <div class="flex gap-2">
                    <button onclick="toggleModal('log-modal', false)" class="flex-1 py-3 bg-gray-100 rounded-xl font-medium">閉じる</button>
                    <button onclick="saveLog()" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-medium">記録を保存</button>
                </div>
                <div id="history-container" class="mt-4 max-h-40 overflow-y-auto border-t pt-4">
                    <p class="text-sm font-bold mb-2">これまでの記録</p>
                    <div id="log-history" class="space-y-2 text-sm text-gray-600"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let vegetables = JSON.parse(localStorage.getItem('veg_tracker_data')) || [];
        let currentEditingId = null;

        // Initialize Lucide Icons with safety check
        function initIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                console.warn('Lucide library not loaded yet.');
            }
        }

        // Toggle Modal
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
                if(id === 'add-modal') clearInputs();
            }
        }

        function clearInputs() {
            document.getElementById('input-name').value = '';
            document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('input-harvest-days').value = '';
        }

        // Add Vegetable
        function addVegetable() {
            const name = document.getElementById('input-name').value;
            const date = document.getElementById('input-date').value;
            const days = document.getElementById('input-harvest-days').value;

            if (!name || !date) {
                const errorMsg = '名前と日付を入力してください';
                console.error(errorMsg);
                return;
            }

            const newVeg = {
                id: Date.now(),
                name,
                startDate: date,
                harvestDays: parseInt(days) || 0,
                logs: []
            };

            vegetables.push(newVeg);
            saveData();
            render();
            toggleModal('add-modal', false);
        }

        // Delete Vegetable
        function deleteVeg(id) {
            // alert() is avoided as per guidelines, but using a simple confirmation for deletion
            if (confirm('このデータを削除してもよろしいですか？')) {
                vegetables = vegetables.filter(v => v.id !== id);
                saveData();
                render();
            }
        }

        // Log Management
        function openLog(id) {
            currentEditingId = id;
            const veg = vegetables.find(v => v.id === id);
            document.getElementById('log-title').innerText = `${veg.name}の記録`;
            document.getElementById('log-content').value = '';
            
            const history = document.getElementById('log-history');
            history.innerHTML = veg.logs.length ? '' : '<p class="text-xs text-gray-400">記録はまだありません</p>';
            
            // Sort logs by date descending
            const sortedLogs = [...veg.logs].sort((a,b) => new Date(b.date) - new Date(a.date));
            
            sortedLogs.forEach(log => {
                const logItem = document.createElement('div');
                logItem.className = 'bg-gray-50 p-2 rounded mb-2';
                logItem.innerHTML = `
                    <span class="text-[10px] text-gray-400 font-mono">${log.date}</span>
                    <p>${log.text}</p>
                `;
                history.appendChild(logItem);
            });

            toggleModal('log-modal', true);
        }

        function saveLog() {
            const text = document.getElementById('log-content').value;
            if (!text) return;

            const veg = vegetables.find(v => v.id === currentEditingId);
            veg.logs.push({
                date: new Date().toLocaleString('ja-JP'),
                text: text
            });

            saveData();
            openLog(currentEditingId); // Refresh history in modal
        }

        // Storage
        function saveData() {
            localStorage.setItem('veg_tracker_data', JSON.stringify(vegetables));
        }

        // Render UI
        function render() {
            const list = document.getElementById('vegetable-list');
            const emptyState = document.getElementById('empty-state');
            const growingStat = document.getElementById('stat-growing');
            const harvestStat = document.getElementById('stat-harvest');

            list.innerHTML = '';
            
            if (vegetables.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            let harvestComingCount = 0;

            vegetables.forEach(veg => {
                const start = new Date(veg.startDate);
                const today = new Date();
                const diffTime = Math.abs(today - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                let progress = 0;
                if (veg.harvestDays > 0) {
                    progress = Math.min(Math.round((diffDays / veg.harvestDays) * 100), 100);
                    if (progress > 80 && progress < 100) harvestComingCount++;
                }

                const card = document.createElement('div');
                card.className = 'glass-card p-5 rounded-3xl shadow-sm relative overflow-hidden group transition-all hover:shadow-md';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800">${veg.name}</h3>
                            <p class="text-xs text-gray-500 flex items-center gap-1">
                                <i data-lucide="calendar"></i> ${veg.startDate} 栽培開始
                            </p>
                        </div>
                        <button onclick="deleteVeg(${veg.id})" class="text-gray-300 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>

                    <div class="flex items-center gap-4 mb-4">
                        <div class="flex-1">
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-green-600 font-medium">${diffDays}日目</span>
                                <span class="text-gray-400">${veg.harvestDays > 0 ? veg.harvestDays + '日で収穫予定' : '-'}</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2">
                                <div class="bg-green-500 h-2 rounded-full transition-all duration-1000" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black text-green-600">${progress}<span class="text-xs">%</span></span>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="openLog(${veg.id})" class="flex-1 py-2 bg-green-50 text-green-700 rounded-xl text-sm font-medium hover:bg-green-100 flex items-center justify-center gap-1">
                            <i data-lucide="edit-3"></i> 記録をつける
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });

            growingStat.innerText = vegetables.length;
            harvestStat.innerText = harvestComingCount;
            
            // Re-initialize icons after DOM update
            initIcons();
        }

        // Initial setup
        window.addEventListener('load', () => {
            document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
            render();
            // Final check to ensure icons are rendered
            initIcons();
        });
    </script>
</body>
</html>
